<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FitForge AI — Adaptive CrossFit WOD Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body { margin: 0; min-height: 100%; background: #0a0908; color: #fafaf9; font-family: system-ui, sans-serif; }
      #root { min-height: 100vh; }
      #root .card { background: #171614; border-radius: 20px; padding: 1.5rem; box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 2px 4px rgba(0,0,0,0.14); }

      #root button[type="submit"] { background: #f59e0b; color: #0a0908; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; cursor: pointer; width: 100%; border: none; }
      #root a { color: #fbbf24; }

    <div id="root">Loading FitForge…</div>
